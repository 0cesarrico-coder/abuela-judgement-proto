<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#2A5C7A">
<title>Abuela's Judgement — Prototype</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:#15110e;overflow:hidden;font-family:'Trebuchet MS','Segoe UI',sans-serif;
    touch-action:none;overscroll-behavior:none;}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  #game{display:block;background:#0a0807;box-shadow:0 0 60px rgba(0,0,0,.7);}
  #tapstart{position:fixed;inset:0;z-index:30;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:radial-gradient(circle at 50% 40%,#3a2c20,#140f0b);color:#F2A93B;text-align:center;cursor:pointer;}
  #tapstart h1{font-size:9vw;font-weight:900;color:#F2A93B;text-shadow:3px 3px 0 #C8341F,5px 5px 0 #1c1714;letter-spacing:1px;line-height:1;}
  #tapstart .pill{margin-top:7vh;background:#C8341F;border:4px solid #1c1714;border-radius:18px;padding:14px 30px;
    color:#fff;font-weight:900;font-size:5vw;box-shadow:0 6px 0 rgba(0,0,0,.4);animation:bob 1.2s ease-in-out infinite;}
  #tapstart p{margin-top:3vh;color:#e8d2a8;font-size:3.6vw;opacity:.85;max-width:80vw;}
  @keyframes bob{50%{transform:translateY(-7px);}}
  .hidden{display:none!important;}
</style>
</head>
<body>
<div id="wrap"><canvas id="game"></canvas></div>
<div id="tapstart">
  <h1>ABUELA'S<br>JUDGEMENT</h1>
  <div class="pill">▶ TOCA PARA JUGAR</div>
  <p>Lanza los ingredientes a la olla con un tiro de honda.<br>Apila el Sazón… y no hagas enojar a la Abuela.</p>
</div>
<script src="matter.min.js"></script>
<script src="game.js"></script>
</body>
</html>
